<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Font Awesome link -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
   <!-- Font Awesome link end -->
    <link rel="stylesheet" href="style4.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.3/font/bootstrap-icons.css">
    <link rel="shortcut icon"
        href="../432351-1355223-raikfcquaxqncofqfm.stackpathdns.com/wp-content/themes/houzez/img/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
    <title>Baku servis</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.2.0/css/datepicker.min.css"
        rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
    <script src="https://netdna.bootstrapcdn.com/bootstrap/2.3.2/js/bootstrap.min.js"></script>
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.2.0/js/bootstrap-datepicker.min.js"></script>
</head>

<body>
    <section class="section">
        <div class="container">
            <div class="row">
                <div class="col-md-5 price">
                    <div class="div-1">
                        <div class="div-1-1">
                            <p>Ödəniləcək məbləğ</p>
                            <h3>15 AZN</h3>
                            <a href="index.html">
                            <i class="bi bi-caret-left"></i>
                            <p>Ödəməni ləğv edin.</p>
                            </a>
                      </div>
                    </div>
                </div>
                <div class="col-md-7 payment">
                    <div class="div-header">
                        <h2>Ödəniş</h2>
                        <h5>Kart ilə ödəyin.</h5>
                    </div>
                    <div class="div-body">
                        <form>
                            <table>
                                <tr class="cardnumber">
                                    <td><label>Kartın nömrəsi</label></td>
                                    <td>
                                        <input type="number" placeholder="0000 0000 0000 0000" class="form-control">
                                        <i class="bi bi-credit-card-2-front"></i>
                                    </td>
                                </tr>
                                <tr class="date">
                                    <td><label>Son istifadə tarixi</label></td>
                                    <td>
                                        <input type="text" class="form-control" name="datepicker" id="datepicker" placeholder="00/00">
                                        <i class="bi bi-calendar-week"></i>
                                    </td>
                                </tr>
                                <tr class="cvv">
                                    <td><label>CVV/CVC</label></td>
                                    <td>
                                        <input type="number" class="form-control" placeholder="•••">
                                        <i class="bi bi-credit-card-2-back"></i>
                                        <p>Kartın arxasındakı 3 rəqəm.</p>
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <button id="pay">Ödə</button>
                                    </td>
                                </tr>
                            </table>
                        </form>
                    </div>
                    <div class="div-footer">
                        <hr>
                        <p>və ya digər ödəniş üsulunu seçin.</p>
                        <div>
                            <a href="https://www.e-pul.az/epay/az/category/online/pulpal">
                                <img src="./img/epul_logo.png">
                                <h5>PulPal-ilə ödə.</h5>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"

    crossorigin="anonymous"></script>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"></script>
<script>
    $("#datepicker").datepicker({
        format: "mm-yyyy",
        startView: "months",
        minViewMode: "months"
    });
</script>

</html>
